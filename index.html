<!DOCTYPE html>
<html>
<head>
  <title>AK Golf Studio Leaderboard</title>
  <style>
    body {
      margin: 0;
      background-color: #1f1f1f; /* matches your logo background */
      font-family: Arial, sans-serif;
      color: white;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background-color: #1f1f1f;
      border-bottom: 2px solid #2a2a2a;
    }
    .header img {
      height: 80px;
      margin-right: 20px;
    }
    .title {
      font-size: 36px;
      font-weight: bold;
      letter-spacing: 2px;
      color: #d4af37; /* gold tone to match logo */
    }
    .iframe-container {
      width: 100%;
      height: calc(100vh - 120px);
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="logo.png" alt="AK Golf Studio Logo">
    <div class="title">2 PERSON SCRAMBLE LIVE LEADERBOARD</div>
  </div>
  <div class="iframe-container">
    <iframe src="https://portal.trackmangolf.com/tournaments/TXVsdGlSb3VuZFRvdXJuYW1lbnQKZGMzNzM4ZTU2LTU3NTItNDgxZC04ODFmLWU4ZTljZWZmNDdhZTpQdWJsaXNoZWQ=/leaderboard"></iframe>
  </div>
</body>
</html>
